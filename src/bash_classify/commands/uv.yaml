# $schema: ../../../schemas/command.schema.json
command: uv
description: "An extremely fast Python package manager"
strict: false
global_options:
  --help: {overrides: READONLY}
subcommands:
  run:
    classification: DANGEROUS
    strict: false
    delegates_to:
      mode: rest_are_argv
      strip_assignments: true
    subcommands:
      pytest:
        classification: LOCAL_EFFECTS
        strict: false
      ruff:
        classification: LOCAL_EFFECTS
        strict: false
      mypy:
        classification: READONLY
        strict: false
  init:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
  add:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
    options:
      --dry-run: {overrides: READONLY}
  remove:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
    options:
      --dry-run: {overrides: READONLY}
  version:
    classification: READONLY
    strict: false
  sync:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
  lock:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
    options:
      --check: {overrides: READONLY}
  export:
    classification: READONLY
    strict: false
  tree:
    classification: READONLY
    strict: false
  format:
    classification: LOCAL_EFFECTS
    strict: false
  tool:
    strict: false
    subcommands:
      install:
        classification: LOCAL_EFFECTS
        risk: LOW
        strict: false
      uninstall:
        classification: LOCAL_EFFECTS
        risk: LOW
        strict: false
      list:
        classification: READONLY
      run:
        classification: DANGEROUS
        strict: false
      dir:
        classification: READONLY
  python:
    strict: false
    subcommands:
      install:
        classification: LOCAL_EFFECTS
        risk: LOW
        strict: false
      uninstall:
        classification: LOCAL_EFFECTS
        risk: LOW
        strict: false
      list:
        classification: READONLY
      find:
        classification: READONLY
        strict: false
      dir:
        classification: READONLY
      pin:
        classification: LOCAL_EFFECTS
        strict: false
  pip:
    strict: false
    subcommands:
      install:
        classification: LOCAL_EFFECTS
        risk: LOW
        strict: false
      uninstall:
        classification: LOCAL_EFFECTS
        risk: LOW
        strict: false
      list:
        classification: READONLY
        strict: false
      show:
        classification: READONLY
        strict: false
      freeze:
        classification: READONLY
      check:
        classification: READONLY
      compile:
        classification: LOCAL_EFFECTS
        strict: false
  venv:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
  build:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
  publish:
    classification: DANGEROUS
    strict: false
  cache:
    strict: false
    subcommands:
      clean:
        classification: LOCAL_EFFECTS
        risk: LOW
      prune:
        classification: LOCAL_EFFECTS
        risk: LOW
      dir:
        classification: READONLY
  self:
    strict: false
    subcommands:
      update:
        classification: LOCAL_EFFECTS
        risk: LOW
  help:
    classification: READONLY

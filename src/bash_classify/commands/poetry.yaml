# $schema: ../../../schemas/command.schema.json
command: poetry
description: "Python dependency management and packaging"
strict: false
subcommands:
  show:
    classification: READONLY
    strict: false
  version:
    classification: READONLY
    strict: false
  search:
    classification: READONLY
    strict: false
  check:
    classification: READONLY
    strict: false
  env:
    strict: false
    subcommands:
      info:
        classification: READONLY
      list:
        classification: READONLY
      use:
        classification: LOCAL_EFFECTS
        strict: false
      remove:
        classification: LOCAL_EFFECTS
        strict: false
  config:
    classification: LOCAL_EFFECTS
    strict: false
    subcommands:
      list:
        classification: READONLY
  install:
    classification: LOCAL_EFFECTS
    strict: false
  update:
    classification: LOCAL_EFFECTS
    strict: false
  add:
    classification: LOCAL_EFFECTS
    strict: false
  remove:
    classification: LOCAL_EFFECTS
    strict: false
  lock:
    classification: LOCAL_EFFECTS
    strict: false
  build:
    classification: LOCAL_EFFECTS
    strict: false
  init:
    classification: LOCAL_EFFECTS
    strict: false
  new:
    classification: LOCAL_EFFECTS
    strict: false
  shell:
    classification: LOCAL_EFFECTS
  publish:
    classification: DANGEROUS
    strict: false
  run:
    classification: DANGEROUS
    strict: false
    delegates_to:
      mode: rest_are_argv
    subcommands:
      pytest:
        classification: LOCAL_EFFECTS
        strict: false
      ruff:
        classification: LOCAL_EFFECTS
        strict: false
      mypy:
        classification: READONLY
        strict: false
  self:
    strict: false
    subcommands:
      update:
        classification: LOCAL_EFFECTS
        strict: false

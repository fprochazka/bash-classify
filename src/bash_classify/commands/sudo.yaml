# $schema: ../../../schemas/command.schema.json
command: sudo
description: "Execute a command as another user"
classification: DANGEROUS
delegates_to:
  mode: rest_are_argv
  min_classification: DANGEROUS
options:
  -u: {takes_value: true}
  --user: {takes_value: true, aliases: [-u]}
  -g: {takes_value: true}
  --group: {takes_value: true, aliases: [-g]}
  -H: {}
  --set-home: {}
  -E: {}
  --preserve-env: {}
  -n: {}
  --non-interactive: {}
  -S: {}
  --stdin: {}
  -k: {}
  --reset-timestamp: {}

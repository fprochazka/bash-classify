# $schema: ../../../schemas/command.schema.json
command: gog
description: "gogcli — Google Workspace CLI for Gmail, Calendar, Drive, Docs, Sheets, Slides, Chat, Contacts, Tasks, and more"
classification: READONLY

global_options:
  --help: {overrides: READONLY}
  -h: {overrides: READONLY}
  --account: {takes_value: true}
  -a: {takes_value: true, aliases: [--account]}
  --client: {takes_value: true}
  --enable-commands: {takes_value: true}
  --json: {}
  -j: {aliases: [--json]}
  --plain: {}
  -p: {aliases: [--plain]}
  --results-only: {}
  --select: {takes_value: true}
  --dry-run: {overrides: READONLY, risk: LOW}
  -n: {overrides: READONLY, risk: LOW, aliases: [--dry-run]}
  --force: {}
  -y: {aliases: [--force]}
  --no-input: {}
  --verbose: {}
  -v: {aliases: [--verbose]}
  --version: {overrides: READONLY}
  --color: {takes_value: true}

subcommands:
  # ── top-level aliases ────────────────────────────────────────────────
  # These are convenience aliases for common operations.
  send:
    # Alias for gmail send — sends an email
    classification: EXTERNAL_EFFECTS
    strict: false
  ls:
    classification: READONLY
    strict: false
  search:
    classification: READONLY
    strict: false
  open:
    classification: READONLY
    strict: false
  download:
    classification: READONLY
    strict: false
  upload:
    classification: EXTERNAL_EFFECTS
    strict: false
  login:
    # OAuth2 handshake — creates/rotates credential server-side
    classification: EXTERNAL_EFFECTS
    strict: false
  logout:
    classification: LOCAL_EFFECTS
    risk: LOW
    strict: false
  status:
    classification: READONLY
  me:
    classification: READONLY
  whoami:
    classification: READONLY
  version:
    classification: READONLY
  completion:
    classification: READONLY
    strict: false
  exit-codes:
    classification: READONLY
  schema:
    classification: READONLY
    strict: false

  # ── auth ─────────────────────────────────────────────────────────────
  auth:
    classification: READONLY
    subcommands:
      credentials:
        # Storing OAuth client credentials is a local config write
        classification: LOCAL_EFFECTS
        subcommands:
          set:
            classification: LOCAL_EFFECTS
          list:
            classification: READONLY
      add:
        # OAuth2 handshake — creates/rotates credential server-side
        classification: EXTERNAL_EFFECTS
        strict: false
      services:
        classification: READONLY
      list:
        classification: READONLY
        strict: false
      alias:
        classification: LOCAL_EFFECTS
        subcommands:
          list:
            classification: READONLY
          set:
            classification: LOCAL_EFFECTS
          unset:
            classification: LOCAL_EFFECTS
      status:
        classification: READONLY
      keyring:
        # Viewing or setting keyring backend — local config
        classification: LOCAL_EFFECTS
      remove:
        # Removes a stored refresh token
        classification: LOCAL_EFFECTS
      tokens:
        classification: READONLY
        subcommands:
          list:
            classification: READONLY
          delete:
            classification: LOCAL_EFFECTS
          export:
            # Exports a refresh token file — contains secrets
            classification: DANGEROUS
            strict: false
          import:
            classification: LOCAL_EFFECTS
      manage:
        # Opens browser to Google accounts manager
        classification: READONLY
      service-account:
        classification: LOCAL_EFFECTS
        subcommands:
          set:
            classification: LOCAL_EFFECTS
            strict: false
          unset:
            classification: LOCAL_EFFECTS
          status:
            classification: READONLY
      keep:
        # Legacy alias for service-account set (Keep)
        classification: LOCAL_EFFECTS
        strict: false

  # ── config ───────────────────────────────────────────────────────────
  config:
    classification: READONLY
    subcommands:
      get:
        classification: READONLY
      keys:
        classification: READONLY
      set:
        classification: LOCAL_EFFECTS
      unset:
        classification: LOCAL_EFFECTS
      list:
        classification: READONLY
      path:
        classification: READONLY

  # ── agent ────────────────────────────────────────────────────────────
  agent:
    classification: READONLY
    subcommands:
      exit-codes:
        classification: READONLY

  # ── time ─────────────────────────────────────────────────────────────
  time:
    classification: READONLY
    strict: false

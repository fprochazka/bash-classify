# $schema: ../../../schemas/command.schema.json
command: pip3
description: "Python package installer"
strict: false
subcommands:
  list:
    classification: READONLY
    strict: false
  show:
    classification: READONLY
    strict: false
  freeze:
    classification: READONLY
  search:
    classification: READONLY
  check:
    classification: READONLY
  install:
    classification: LOCAL_EFFECTS
    strict: false
  uninstall:
    classification: LOCAL_EFFECTS
    strict: false
  download:
    classification: EXTERNAL_EFFECTS
    strict: false
  wheel:
    classification: EXTERNAL_EFFECTS
    strict: false

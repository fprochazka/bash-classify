# $schema: ../../../schemas/command.schema.json
command: npm
description: "Node.js package manager"
strict: false
subcommands:
  ls:
    classification: READONLY
    strict: false
  list:
    classification: READONLY
    strict: false
  view:
    classification: READONLY
    strict: false
  info:
    classification: READONLY
    strict: false
  outdated:
    classification: READONLY
    strict: false
  audit:
    classification: READONLY
    strict: false
    subcommands:
      fix:
        classification: LOCAL_EFFECTS
  install:
    classification: LOCAL_EFFECTS
    strict: false
  ci:
    classification: LOCAL_EFFECTS
    strict: false
  run:
    classification: LOCAL_EFFECTS
    strict: false
  test:
    classification: LOCAL_EFFECTS
    strict: false
  build:
    classification: LOCAL_EFFECTS
    strict: false
  uninstall:
    classification: LOCAL_EFFECTS
    strict: false
  update:
    classification: LOCAL_EFFECTS
    strict: false
  publish:
    classification: DANGEROUS
    strict: false
  unpublish:
    classification: DANGEROUS
    strict: false
  config:
    subcommands:
      list:
        classification: READONLY
  whoami:
    classification: READONLY
  why:
    classification: READONLY
    strict: false
  explain:
    classification: READONLY
    strict: false

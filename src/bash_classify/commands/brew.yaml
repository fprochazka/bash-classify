# $schema: ../../../schemas/command.schema.json
command: brew
description: "macOS and Linux package manager"
strict: false
global_options:
  --help: {overrides: READONLY}
subcommands:
  list:
    classification: READONLY
  info:
    classification: READONLY
  search:
    classification: READONLY
  install:
    classification: LOCAL_EFFECTS
    risk: LOW
  uninstall:
    classification: LOCAL_EFFECTS
    risk: LOW
  update:
    classification: LOCAL_EFFECTS
    risk: LOW
  upgrade:
    classification: LOCAL_EFFECTS
  cleanup:
    classification: LOCAL_EFFECTS
    risk: LOW
  doctor:
    classification: READONLY
  config:
    classification: READONLY

# $schema: ../../../schemas/command.schema.json
command: cargo
description: "Rust package manager and build tool"
strict: false
subcommands:
  build:
    classification: LOCAL_EFFECTS
  test:
    classification: LOCAL_EFFECTS
  run:
    classification: DANGEROUS
  check:
    classification: READONLY
  clippy:
    classification: READONLY
    options:
      --fix: {overrides: LOCAL_EFFECTS}
  fmt:
    classification: LOCAL_EFFECTS
  doc:
    classification: LOCAL_EFFECTS
  publish:
    classification: DANGEROUS
  install:
    classification: LOCAL_EFFECTS
  clean:
    classification: LOCAL_EFFECTS
  update:
    classification: LOCAL_EFFECTS

# $schema: ../../../schemas/command.schema.json
command: find
description: "Search for files in a directory hierarchy"
classification: READONLY
strict: false
options:
  -delete: {overrides: DANGEROUS}
  -exec:
    delegates_to:
      mode: terminated_argv
      terminator: ";"
  -execdir:
    delegates_to:
      mode: terminated_argv
      terminator: ";"
  -ok:
    delegates_to:
      mode: terminated_argv
      terminator: ";"
  -okdir:
    delegates_to:
      mode: terminated_argv
      terminator: ";"
